# ============================================================
# settings.yaml — Configurazione Streak Monitor
# ============================================================
# Questo è l'UNICO file da modificare per personalizzare
# il comportamento del sistema.
# Le credenziali sensibili NON vanno qui: usare GitHub Secrets.
# ============================================================

# ── Google Drive
drive:
  # ID della cartella Drive con i CSV di MultiCharts.
  # Visibile nell'URL: drive.google.com/drive/folders/QUESTO_ID
  folder_id: "1BUOmf50Ty2-OL-nfarHWfVb0G7vD3X3E"

# ── Email
email:
  subject: "📊 Streak Monitor — Report Notturno"

# ── Soglie del motore di sizing
# Modifica solo se vuoi rendere il sistema più o meno aggressivo.
sizing:
  thresholds:
    # Soglia P(W|streak) per segnale 1.5x
    p_increase_15x: 0.65

    # Soglia P(W|streak) per segnale 2x (richiede anche n >= n_min_medium)
    p_increase_2x: 0.75

    # Soglia P(W|streak) per segnale difensivo 0.5x
    p_decrease_05x: 0.35

    # Numero minimo osservazioni per uscire da "Low" confidence (→ 1x forzato)
    n_min_low: 5

    # Numero minimo per "High" confidence (sblocca il 2x)
    n_min_medium: 15

    # Lunghezza massima della streak analizzata (non analizzare oltre N consecutive)
    max_streak_look: 5

    # ── v2.0: Decay temporale e Expected Value ──

    # Halflife del decay esponenziale (in numero di trade).
    # Le osservazioni più vecchie di ~decay_halflife trade pesano la metà.
    # 0 = disabilitato (comportamento v1 originale).
    # Valori consigliati: 30-80 per sistemi con 100+ trade.
    decay_halflife: 50

    # Soglia EV normalizzato (EV/|avg_loss|) per boost moltiplicatore di +1 livello.
    # Es: se EV/|avg_loss| >= 0.30, il moltiplicatore sale di 1 livello (1x→1.5x, 1.5x→2x).
    # Alzato da 0.15 a 0.30 per evitare boost troppo frequenti.
    ev_boost: 0.30

    # Soglia EV normalizzato per penalità moltiplicatore di -1 livello.
    # Es: se EV/|avg_loss| <= -0.10, il moltiplicatore scende di 1 livello.
    ev_penalize: -0.10

    # ── v2.1: Guardrail anti-aggressività per EV boost ──
    # Il boost EV richiede TRE condizioni simultanee:
    #   1. EV_norm >= ev_boost (edge significativo)
    #   2. P(W) >= ev_boost_pw_floor (probabilità conferma il segnale)
    #   3. Half-Kelly >= ev_boost_hk_floor (edge reale secondo Kelly)

    # P(W|streak) minima per attivare il boost EV.
    # Impedisce boost a sistemi con P(W) < 50% anche se hanno EV positivo per skew.
    ev_boost_pw_floor: 0.50

    # Half-Kelly minimo per attivare il boost EV.
    # Richiede che Kelly confermi l'esistenza di un edge reale.
    ev_boost_hk_floor: 0.02


# ── Override manuali per sistema
# Permette di forzare il moltiplicatore o disabilitare un sistema
# senza toccare il codice. Utile durante eventi macro, rollover, manutenzione.
#
# Formato:
#   NomeSistema:
#     multiplier: 0.5       # forza il moltiplicatore (0.5 / 1.0 / 1.5 / 2.0)
#     reason: "FOMC week"   # motivo leggibile nel report
#
# Per disabilitare un sistema completamente (non comparirà nel report):
#   NomeSistema:
#     enabled: false
#
# Esempi (decommentare per attivare):
overrides: {}
  # BiasIntraweekAAPL:
  #   multiplier: 0.5
  #   reason: "FOMC week — riduzione esposizione macro"
  # ZScoreNVDA:
  #   enabled: false
